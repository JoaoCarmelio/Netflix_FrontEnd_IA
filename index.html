<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Seletor de perfil Netflix - escolha o perfil para começar a assistir">
    <script src="/Projeto_Netflix_com_IA/perfilLoader.js" defer></script>
    <script src="/Projeto_Netflix_com_IA/index.js" defer></script>
    <link rel="stylesheet" href="/Projeto_Netflix_com_IA/styles.css">
    <title>Selecionar Perfil - Netflix</title>
</head>
<body>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>

        <section class="profiles" aria-label="Perfis disponíveis">
            <ul class="profile-list">
                <li>
                    <a href="/Projeto_Netflix_com_IA/catalogo/catalogo.html" class="Perfil" data-profile-name="Perfil 1" data-profile-img="/Projeto_Netflix_com_IA/assets/foto1.png">
                    <figure class="profile">
                        <img src="/Projeto_Netflix_com_IA/assets/foto1.png" alt="Avatar do Perfil 1">
                        <figcaption>Perfil 1</figcaption>
                    </a>    
                    </figure>
                </li>
                <li>
                    <a href="/Projeto_Netflix_com_IA/catalogo/catalogo.html" class="Perfil" data-profile-name="Perfil 2" data-profile-img="/Projeto_Netflix_com_IA/assets/foto2.png">
                    <figure class="profile">
                        <img src="/Projeto_Netflix_com_IA/assets/foto2.png" alt="Avatar do Perfil 2">
                        <figcaption>Perfil 2</figcaption>
                    </figure>
                    </a>
                </li>
                <li>
                    <a href="/Projeto_Netflix_com_IA/catalogo/catalogo.html" class="Perfil" data-profile-name="Perfil 3" data-profile-img="/Projeto_Netflix_com_IA/assets/foto3.png">
                    <figure class="profile">
                        <img src="/Projeto_Netflix_com_IA/assets/foto3.png" alt="Avatar do Perfil 3">
                        <figcaption>Perfil 3</figcaption>
                    </figure>
                    </a>
                </li>
                <li>
                    <a href="/Projeto_Netflix_com_IA/catalogo/catalogo.html" class="Perfil" data-profile-name="Perfil 4" data-profile-img="/Projeto_Netflix_com_IA/assets/foto4.png">
                    <figure class="profile">
                        <img src="/Projeto_Netflix_com_IA/assets/foto4.png" alt="Avatar do Perfil 4">
                        <figcaption>Perfil 4</figcaption>
                    </figure>
                    </a>
                </li>
            </ul>
           
        </section>
        <button class="btnManagerPerfil">Gerenciar Perfis</button>
    </main>
    <button id="btnToggle">Alternar</button>
    
       
</body>
</html>
